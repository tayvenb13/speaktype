name: Build & Release

# Builds the macOS app (Release, ad-hoc signed) and publishes a GitHub Release
# with a .dmg and a .zip. Triggered by pushing a v* tag, or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v1.0.30)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project speaktype.xcodeproj -scheme speaktype

      - name: Build (Release, ad-hoc signed)
        run: |
          xcodebuild build \
            -project speaktype.xcodeproj \
            -scheme speaktype \
            -configuration Release \
            -destination 'platform=macOS' \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES

      - name: Package .dmg and .zip
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/build/speaktype-tb.app"
          test -d "$APP"
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "speaktype-tb" -srcfolder "$STAGE" -ov -format UDZO \
            "speaktype-tb-${TAG}.dmg"
          ditto -c -k --keepParent "$APP" "speaktype-tb-${TAG}.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            "speaktype-tb-${TAG}.dmg" \
            "speaktype-tb-${TAG}.zip" \
            --title "speaktype-tb ${TAG}" \
            --generate-notes \
            --target "$GITHUB_SHA"
